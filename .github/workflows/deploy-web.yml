name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.4.1.stable
          cp -r /root/.local/share/godot/export_templates/4.4.1.stable/* \
                ~/.local/share/godot/export_templates/4.4.1.stable/ 2>/dev/null || true

      - name: Export Web build
        run: |
          mkdir -p web
          godot --headless --export-release "Web" web/index.html

      - name: Add .nojekyll (required for GitHub Pages with Godot)
        run: touch web/.nojekyll

      - name: Add COOP/COEP headers via _headers file (Netlify) and htaccess (Apache)
        # SharedArrayBuffer (used by Godot threads) requires cross-origin isolation headers
        run: |
          cat > web/_headers << 'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          force_orphan: true
